name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-amd64
          - goos: darwin
            goarch: amd64
            platform: darwin-amd64
          - goos: darwin
            goarch: arm64
            platform: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${{ github.sha }}"
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')

          LDFLAGS="-X 'github.com/gonzaloalvarez/kepr/internal/buildflags.Env=prod'"
          LDFLAGS="$LDFLAGS -X 'github.com/gonzaloalvarez/kepr/internal/buildflags.Version=$VERSION'"
          LDFLAGS="$LDFLAGS -X 'github.com/gonzaloalvarez/kepr/internal/buildflags.Commit=$COMMIT'"
          LDFLAGS="$LDFLAGS -X 'github.com/gonzaloalvarez/kepr/internal/buildflags.BuildTime=$BUILD_TIME'"
          if [ -n "$GH_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/gonzaloalvarez/kepr/internal/init.githubClientID=$GH_CLIENT_ID'"
          fi
          if [ -n "$GH_CLIENT_SECRET" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/gonzaloalvarez/kepr/internal/init.githubClientSecret=$GH_CLIENT_SECRET'"
          fi

          go build -ldflags "$LDFLAGS" -o kepr-${{ matrix.platform }} main.go

          echo "Built kepr-${{ matrix.platform }}"
          file kepr-${{ matrix.platform }}

      - name: Create archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -czf kepr-v$VERSION-${{ matrix.platform }}.tar.gz kepr-${{ matrix.platform }}
          ls -lh kepr-v$VERSION-${{ matrix.platform }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kepr-${{ matrix.platform }}
          path: kepr-v${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.gz
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating release for version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name "*.tar.gz" -exec mv {} release/ \;
          ls -lh release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
